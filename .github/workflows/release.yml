name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  sync-version:
    name: Sync package.json with tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update package.json on main if needed
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          current=$(node -p "require('./package.json').version")
          if [ "$current" = "$version" ]; then
            echo "package.json on main already at $version"
            exit 0
          fi
          echo "Bumping package.json on main: $current -> $version"
          node -e '
            const fs = require("fs");
            const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
            p.version = process.argv[1];
            fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
          ' "$version"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "Sync package.json version to $tag"
          git push origin main

  build:
    name: Build (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chrome
            script: zip
          - browser: firefox
            script: zip:firefox
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync package.json to tag version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          current=$(node -p "require('./package.json').version")
          if [ "$current" != "$version" ]; then
            echo "Overriding package.json version for build: $current -> $version"
            node -e '
              const fs = require("fs");
              const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
              p.version = process.argv[1];
              fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
            ' "$version"
          else
            echo "package.json already at $version"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and zip extension
        run: pnpm ${{ matrix.script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.browser }}
          path: .output/*.zip
          if-no-files-found: error
          include-hidden-files: true

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve previous tag
        id: prev
        run: |
          current="${GITHUB_REF_NAME}"
          previous=$(git tag --sort=-v:refname | grep -vFx "$current" | head -n 1 || true)
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "previous=$previous" >> "$GITHUB_OUTPUT"

      - name: Build changelog
        id: changelog
        run: |
          current="${{ steps.prev.outputs.current }}"
          previous="${{ steps.prev.outputs.previous }}"
          repo_url="${{ github.server_url }}/${{ github.repository }}"
          {
            echo "## Changelog"
            echo
            if [ -n "$previous" ]; then
              echo "Changes since \`$previous\`:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "$previous..$current"
              echo
              echo
              echo "**Full Changelog**: $repo_url/compare/$previous...$current"
            else
              echo "Initial release. All commits included:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "$current"
            fi
            echo
          } > CHANGELOG.md
          cat CHANGELOG.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: artifacts/*.zip
          fail_on_unmatched_files: true

  publish-chrome:
    name: Publish to Chrome Web Store
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Chrome artifact
        uses: actions/download-artifact@v4
        with:
          name: chrome
          path: artifacts

      - name: Locate zip
        id: zip
        run: |
          path=$(ls artifacts/*.zip | head -n 1)
          if [ -z "$path" ]; then
            echo "No zip found in artifacts/" >&2
            exit 1
          fi
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Upload and publish
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: npx --yes chrome-webstore-upload-cli@3 upload --source "${{ steps.zip.outputs.path }}" --auto-publish
